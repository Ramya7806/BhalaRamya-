<!DOCTYPE html>
<html>
<head>
    <title>HTML Table Example</title>
    <style>
        table {
            width: 50%;
            border-collapse: collapse;
        }
        th, td {
            border: 1px solid black;
            padding: 8px;
            text-align: center;
        }
        th {
            background-color: lightgray;
        }
    </style>
</head>
<body>

<h2>Student Table</h2>

<table>
    <tr>
        <th>Name</th>
        <th>Age</th>
        <th>Grade</th>
    </tr>
    <tr>
        <td>Alice</td>
        <td>20</td>
        <td>A</td>
    </tr>
    <tr>
        <td>Bob</td>
        <td>21</td>
        <td>B</td>
    </tr>
    <tr>
        <td>Charlie</td>
        <td>19</td>
        <td>A+</td>
    </tr>
</table>

</body>
</html>
