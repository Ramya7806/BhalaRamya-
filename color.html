<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Colors and Background</title>

    <style>
        /* Paragraph */
        p {
            color: red;
        }

        /* Heading 1 - HEX color */
        h1 {
            color: #2eb721; /* green shade */
        }

        /* Heading 2 - RGB */
        h2 {
            color: rgb(255, 100, 200);
        }

        /* Pre tag - RGBA */
        pre {
            color: rgba(121, 100, 255, 0.8);
        }

        body {
            margin: 0;
        }

        /* Box with background */
        .box {
            height: 300px;
            background-color: rebeccapurple;
            background-image: url("https://via.placeholder.com/300"); /* sample image */
            background-repeat: no-repeat;
            background-position: top right;
        }
    </style>
</head>

<body>

    <p>direct color</p>

    <h1>hex-color format</h1>

    <h2>rgb</h2>

    <pre>
aiosbuxioqweyxqwen
    </pre>

    <div class="box">
        <h1>Welcome</h1>
        <p>to CSS</p>
    </div>

</body>
</html>
