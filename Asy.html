<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>

    <h2>loading</h2>
    <button onclick="load()">get data</button>
    <p id="output">"output generated by cliking button"</p>

    <script>
        function fet() {
            return new Promise((resolve, reject) => {
                setTimeout(() => {
                    resolve("data load successfully");
                }, 2000);
            });
        }

        async function load() {
            let output = document.getElementById("output");
            output.innerText = "Loading...";

            try {
                let data = await fet();
                output.innerText = data;
            } catch (error) {
                output.innerText = "error loading the data";
            }
        }
    </script>
</body>
</html>
