<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CSS Buttons</title>

<style>
    body {
        margin: 0;
        font-family: Arial, sans-serif;
        text-align: center;
        background: linear-gradient(to bottom, #5fb0b7, #6bc1c9);
        color: #000;
    }

    h1 {
        margin-top: 30px;
    }

    p {
        margin-bottom: 30px;
    }

    h2 {
        margin-top: 40px;
    }

    /* Common Button Style */
    .btn {
        padding: 10px 20px;
        border: none;
        border-radius: 8px;
        margin: 10px;
        cursor: pointer;
        font-size: 14px;
        transition: 0.3s;
    }

    .btn:hover {
        transform: scale(1.05);
        opacity: 0.9;
    }

    /* Basic Buttons */
    .primary { background: #2d89ef; color: white; }
    .secondary { background: #6c757d; color: white; }
    .success { background: #28a745; color: white; }
    .danger { background: #dc3545; color: white; }

    /* Button Group */
    .group {
        display: inline-flex;
        margin-top: 10px;
    }

    .group button {
        background: #4caf50;
        color: white;
        border-radius: 0;
    }

    .group button:first-child {
        border-top-left-radius: 8px;
        border-bottom-left-radius: 8px;
    }

    .group button:last-child {
        border-top-right-radius: 8px;
        border-bottom-right-radius: 8px;
    }

    /* Modern Buttons */

    .outline {
        background: transparent;
        border: 2px solid #2196f3;
        color: #2196f3;
    }

    .outline:hover {
        background: #2196f3;
        color: white;
    }

    .gradient {
        background: linear-gradient(to right, #ff7e5f, #feb47b);
        color: white;
    }

    .glass {
        background: rgba(255,255,255,0.2);
        backdrop-filter: blur(5px);
        color: #000;
    }

    .shadow {
        background: white;
        box-shadow: 0 4px 10px rgba(0,0,0,0.2);
    }

    .rounded {
        background: purple;
        color: white;
        border-radius: 30px;
    }

</style>
</head>

<body>

<h1>CSS-Button</h1>

<h2>Basic Button Styles</h2>
<button class="btn primary">Primary</button>
<button class="btn secondary">Secondary</button>
<button class="btn success">Success</button>
<button class="btn danger">Danger</button>

<h2>Button Group</h2>
<div class="group">
    <button class="btn">Left</button>
    <button class="btn">Middle</button>
    <button class="btn">Right</button>
</div>

<h2>Modern Button Styles</h2>
<button class="btn outline">Outline</button>
<button class="btn gradient">Gradient</button>
<button class="btn glass">Glass</button>
<button class="btn shadow">Shadow</button>
<button class="btn rounded">Rounded</button>

</body>
</html>
