<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loops in JS - Presentation</title>
    <style>
        body {
            background-color: #ffd700;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            margin: 0;
        }

        .header {
            background-color: #000;
            color: white;
            width: 100%;
            max-width: 800px;
            text-align: right;
            padding: 10px 20px;
            box-sizing: border-box;
            font-size: 24px;
            font-weight: bold;
        }

        .content-card {
            background-color: white;
            width: 100%;
            max-width: 760px;
            min-height: 500px;
            margin-top: 20px;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            white-space: pre-wrap;
            font-family: monospace;
            font-size: 16px;
            line-height: 1.5;
            color: #333;
        }
    </style>
</head>
<body>

    <div class="header">Loops in Js</div>

    <div class="content-card" id="output"></div>

    <script>
        const outputDiv = document.getElementById('output');
        let result = "";

        // --- ORIGINAL LOOPS ---
        result += "for loop:\n";
        for (let i = 1; i <= 5; i++) {
            result += "i=" + i + "\n";
        }

        result += "\nwhile loop:\n";
        let j_while = 6;
        while (j_while <= 10) {
            result += "j=" + j_while + "\n";
            j_while++;
        }

        result += "\nDo-while loop:\n";
        let k = 11;
        do {
            result += "k=" + k + "\n";
            k++;
        } while (k <= 16);

        result += "\nfor in loop:\n";
        const person = { name: "Ramya", age: 1, school: "RBS" };
        for (let key in person) {
            result += key + "=" + person[key] + "\n";
        }

        result += "\nfor of loop:\n";
        const nums = [0, 1, 2, 3];
        for (let val of nums) {
            result += val + "\n";
        }

        // --- CONTROL FLOW ---
        
        result += "\nbreak\n";
        for (let i = 21; i <= 26; i++) {
            result += i + "\n";
        }

        result += "\ncontinue\n";
        for (let i = 27; i <= 38; i++) {
            if (i === 35 || i === 30) { // Skips 30 and 35 to match image gaps
                continue;
            }
            result += i + "\n";
        }

        result += "\ninfinity\n";
        let count = 111;
        while (true) { 
            result += count + "\n";
            if (count === 115) {
                break;
            }
            count++;
        }

        // --- NESTED LOOP (NEW) ---
        result += "\nLOOP INSIDE LOOP\n";
        for (let i = 1; i <= 6; i++) {
            for (let j = 1; j <= 3; j++) {
                result += "i=" + i + ",j=" + j + "\n";
            }
        }

        // Display everything
        outputDiv.textContent = result;
    </script>

</body>
</html>
