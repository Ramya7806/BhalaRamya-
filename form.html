<!DOCTYPE html>
<html>
<head>
    <title>Form and Validation</title>

    <style>
        body {
            font-family: Georgia, serif;
            margin: 0;
            padding: 0;
            background: linear-gradient(to right, #c89bff, #faffb2);
        }

        .container {
            width: 350px;
            margin: 30px auto;
        }

        h1 {
            text-align: center;
        }

        label {
            font-size: 20px;
            font-weight: bold;
            display: block;
            margin-top: 25px;
        }

        input {
            width: 100%;
            padding: 8px;
            margin-top: 8px;
            border: 1px solid gray;
        }

        .msg {
            font-size: 14px;
            margin-top: 5px;
        }

        .valid {
            color: green;
        }

        .invalid {
            color: red;
        }

        .btns {
            margin-top: 25px;
            display: flex;
            justify-content: space-between;
        }

        button {
            padding: 8px 15px;
            border-radius: 20px;
            border: none;
            cursor: pointer;
        }

        .submitBtn {
            background: lightgray;
        }

        .apiBtn {
            background: #6fd3c1;
        }

        #finalMsg {
            margin-top: 20px;
            font-weight: bold;
            text-align: center;
        }
    </style>
</head>

<body>

<div class="container">
    <h1>Form and Validation</h1>

    <form onsubmit="return submitForm()">

        <label>username</label>
        <input type="text" id="username" placeholder="enter name">
        <div id="userMsg" class="msg"></div>

        <label>email</label>
        <input type="text" id="email" placeholder="enter email">
        <div id="emailMsg" class="msg"></div>

        <label>phone number</label>
        <input type="text" id="phone" placeholder="10 enter phone number">
        <div id="phoneMsg" class="msg"></div>

        <label>password</label>
        <input type="password" id="password" placeholder="Min 8 ,upp 1,low 1,num 1">
        <div id="passMsg" class="msg"></div>

        <label>Confirmpassword</label>
        <input type="password" id="confirm">
        <div id="confirmMsg" class="msg"></div>

        <div class="btns">
            <button type="submit" class="submitBtn">Submit</button>
            <button type="button" class="apiBtn" onclick="checkAPI()">check valid (API)</button>
        </div>

        <div id="finalMsg"></div>

    </form>
</div>

<script>

// Validation Functions
function validateAll() {

    let valid = true;

    let username = document.getElementById("username").value;
    let email = document.getElementById("email").value;
    let phone = document.getElementById("phone").value;
    let password = document.getElementById("password").value;
    let confirm = document.getElementById("confirm").value;

    // Username
    if (username.length >= 3) {
        userMsg.innerHTML = "Looks good";
        userMsg.className = "msg valid";
    } else {
        userMsg.innerHTML = "Invalid username";
        userMsg.className = "msg invalid";
        valid = false;
    }

    // Email
    let ep = /^[^ ]+@[^ ]+\.[a-z]{2,3}$/;
    if (email.match(ep)) {
        emailMsg.innerHTML = "Valid email";
        emailMsg.className = "msg valid";
    } else {
        emailMsg.innerHTML = "Invalid email";
        emailMsg.className = "msg invalid";
        valid = false;
    }

    // Phone
    let pp = /^[0-9]{10}$/;
    if (phone.match(pp)) {
        phoneMsg.innerHTML = "Valid Phone Number";
        phoneMsg.className = "msg valid";
    } else {
        phoneMsg.innerHTML = "Invalid Phone Number";
        phoneMsg.className = "msg invalid";
        valid = false;
    }

    // Password
    let pw = /^(?=.*[A-Z])(?=.*[a-z])(?=.*[0-9]).{8,}$/;
    if (password.match(pw)) {
        passMsg.innerHTML = "Valid Password Number";
        passMsg.className = "msg valid";
    } else {
        passMsg.innerHTML = "Weak Password";
        passMsg.className = "msg invalid";
        valid = false;
    }

    // Confirm
    if (password === confirm && confirm !== "") {
        confirmMsg.innerHTML = "Password match";
        confirmMsg.className = "msg valid";
    } else {
        confirmMsg.innerHTML = "Password not match";
        confirmMsg.className = "msg invalid";
        valid = false;
    }

    return valid;
}

// Submit Button
function submitForm() {
    let result = validateAll();
    let finalMsg = document.getElementById("finalMsg");

    if (result) {
        finalMsg.innerHTML = "Form Submitted Successfully!";
        finalMsg.style.color = "green";
    } else {
        finalMsg.innerHTML = "Submission Failed! Check inputs.";
        finalMsg.style.color = "red";
    }

    return false;
}

// API Simulation Button
function checkAPI() {
    let result = validateAll();
    let finalMsg = document.getElementById("finalMsg");

    if (result) {
        finalMsg.innerHTML = "API Check: All data is valid ✅";
        finalMsg.style.color = "green";
    } else {
        finalMsg.innerHTML = "API Check: Invalid data ❌";
        finalMsg.style.color = "red";
    }
}

</script>

</body>
</html>
