<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>flex-layout</title>

<style>

body{
    background-color: antiquewhite;
    font-family: Cambria, serif;
    padding: 40px;
}

/* Heading */
h1{
    text-align: center;
    border: 2px solid brown;
    padding: 10px;
}

/* ROW REVERSE */
.flex-containerrow{
    display: flex;
    flex-direction: row-reverse;  /* 🔥 changed */
    justify-content: space-around;
    align-items: center;
}

.b1, .b2, .b3{
    border: 2px dotted greenyellow;
    padding: 30px;
    background-color: lightblue;
}

/* COLUMN REVERSE */
.flex-containercolumn{
    display: flex;
    height: 250px;
    background-color: aqua;
    padding: 40px;
    border: 5px dashed brown;
    flex-direction: column-reverse;  /* 🔥 changed */
    justify-content: space-around;
}

.item1, .item2, .item3{
    width: 100px;
    height: 60px;
    background-color: lightcoral;
    border: 5px dashed rgb(147, 46, 46);
    text-align: center;
    line-height: 60px;
    font-weight: bold;
}

/* Container */
.container{
    display: flex;
    flex-direction: row-reverse; /* 🔥 added */
    border: 5px dashed black;
    padding: 10px;
    gap: 45px;
}

.item{
    flex: 1;
    background-color: aliceblue;
    text-align: center;
    padding: 20px;
}

/* Nested */
.nested{
    background-color: aquamarine;
    border: 4px solid black;
    margin: 10px;
    padding: 10px;
}

/* Last section */
.c{
    display: flex;
    justify-content: space-around; /* fixed typo */
    align-items: center;
    gap: 30px;
    border: 4px solid black;
    padding: 10px;
    flex-direction: row-reverse; /* 🔥 added */
}

.ma{
    background-color: aqua;
    text-align: center;
    border: 4px solid black;
    flex: 1;
}

.ma2{
    background-color: aqua;
    text-align: center;
    border: 4px solid black;
    flex: 2;
}

.ma3{
    align-self: flex-end;
    background-color: aqua;
    flex: 1;
}

</style>
</head>

<body>

<h1>Flexbox Layout</h1>

<h2>Row Reverse</h2>
<div class="flex-containerrow">
    <div class="b1">1</div>
    <div class="b2">2</div>
    <div class="b3">3</div>
</div>

<h2>Column Reverse</h2>
<div class="flex-containercolumn">
    <div class="item1">1</div>
    <div class="item2">2</div>
    <div class="item3">3</div>
</div>

<h2>Container Reverse</h2>
<div class="container">
    <div class="item">4</div>
    <div class="item">
        <div class="nested">nested</div>
        <div class="nested">nested</div>
        <div class="nested">nested</div>
    </div>
    <div class="item">6</div>
</div>

<h2>Flex Align Reverse</h2>
<div class="c">
    <div class="ma">item1</div>
    <div class="ma2">item2</div>
    <div class="ma3">item3</div>
</div>

</body>
</html>
