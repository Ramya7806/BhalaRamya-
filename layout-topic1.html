<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Layout Page</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #fdf6e3;
        }

        /* Header Section */
        header {
            background-color: #000;
            color: #fff;
            text-align: center;
            padding: 20px 0;
            font-size: 24px;
            font-weight: bold;
        }

        /* Navigation Menu */
        nav {
            background-color: #fff;
            text-align: center;
            padding: 10px 0;
            border-bottom: 2px solid #ddd;
        }

        nav a {
            text-decoration: none;
            color: #333;
            margin: 0 15px;
            font-size: 14px;
        }

        /* Main Container */
        .container {
            background-color: #00e5ff;
            padding: 20px;
            margin: 20px;
            border: 1px solid #ccc;
        }

        h2 {
            margin-top: 0;
            font-size: 18px;
        }

        /* Block Elements */
        .block-element {
            background-color: #0000ff;
            color: #fff;
            padding: 10px;
            margin-bottom: 10px;
            display: block; /* Default for div */
        }

        /* Inline Elements */
        .inline-container {
            background-color: #ffe4b5;
            padding: 15px;
            border: 1px solid #d2b48c;
        }

        .inline-element {
            display: inline-block;
            margin-right: 10px;
            font-weight: bold;
        }

        /* Footer Section */
        footer {
            text-align: center;
            padding: 10px;
            border-top: 1px solid #8b4513;
            margin: 20px;
            font-size: 12px;
            color: #8b4513;
        }
    </style>
</head>
<body>

    <header>My Layout page</header>

    <nav>
        <a href="#">Home</a>
        <a href="#">Education</a>
        <a href="#">About</a>
        <a href="#">Contact</a>
    </nav>

    <div class="container">
        <h2>Normal flow example</h2>
        
        <h3>Block Element</h3>
        <div class="block-element">Block1</div>
        <div class="block-element">Block2</div>

        <h3>Inline Element</h3>
        <div class="inline-container">
            <span class="inline-element">Block1</span>
            <span class="inline-element">Block2</span>
        </div>
    </div>

    <footer>
        @2026 My Page
    </footer>

</body>
</html>
