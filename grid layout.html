<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CSS Grid Layout</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #f5f5f5;
}

header {
    background: #2c3e50;
    color: white;
    text-align: center;
    padding: 15px;
}

.container {
    display: grid;
    grid-template-columns: 250px 1fr;
    gap: 15px;
    padding: 15px;
}

.sidebar {
    background: #34495e;
    color: white;
    padding: 15px;
    border-radius: 10px;
}

.cards {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 15px;
}

.card {
    background: white;
    padding: 10px;
    border-radius: 10px;
    text-align: center;
    box-shadow: 0 2px 8px rgba(0,0,0,0.1);
}

.card img {
    width: 100%;
    height: 150px;
    object-fit: cover;
    border-radius: 10px;
}

/* fallback color if image fails */
.card img:broken {
    background: #ccc;
}

/* Bottom */
.bottom {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 15px;
    padding: 15px;
}

.box {
    background: #2980b9;
    color: white;
    padding: 20px;
    text-align: center;
    border-radius: 10px;
}

footer {
    background: #2c3e50;
    color: white;
    text-align: center;
    padding: 10px;
}

/* Responsive */
@media(max-width:768px){
    .container { grid-template-columns: 1fr; }
    .bottom { grid-template-columns: 1fr; }
}
</style>

</head>

<body>

<header>
    <h2>CSS Grid Layout</h2>
</header>

<div class="container">

    <div class="sidebar">
        <h3>Sidebar</h3>
        <ul>
            <li>Grid Basics</li>
            <li>Grid Areas</li>
            <li>Responsive Grid</li>
            <li>Grid vs Flexbox</li>
        </ul>
    </div>

    <div class="cards">

        <!-- Taj Mahal -->
        <div class="card">
            <img src="https://images.unsplash.com/photo-1564507592333-c60657eea523">
            <h4>Taj Mahal</h4>
        </div>

        <!-- Eiffel Tower -->
        <div class="card">
             <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/3/3f/Fronalpstock_big.jpg/640px-Fronalpstock_big.jpg">
            <h4>Eiffel Tower</h4>
        </div>

        <!-- Great Wall -->
        <div class="card">
            <img src="https://images.unsplash.com/photo-1508804185872-d7badad00f7d">
            <h4>Great Wall</h4>
        </div>

        <!-- Colosseum -->
        <div class="card">
            <img src="https://images.unsplash.com/photo-1552832230-c0197dd311b5">
            <h4>Colosseum</h4>
        </div>

    </div>
</div>

<div class="bottom">
    <div class="box">Responsive</div>
    <div class="box">Flexible</div>
    <div class="box">Powerful</div>
</div>

<footer>
    <p>© 2026 CSS Grid Demo</p>
</footer>

</body>
</html>
