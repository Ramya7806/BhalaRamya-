<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Z-Index Demo</title>

  <style>
    body {
      background-color: #d8d0bd;
      font-family: Arial, sans-serif;
      padding: 20px;
    }

    h2 {
      margin-bottom: 5px;
    }

    .container {
      position: relative;
      width: 400px;
      height: 300px;
    }

    .box {
      position: absolute;
      width: 150px;
      height: 100px;
      border-radius: 8px;
      display: flex;
      justify-content: center;
      align-items: center;
      font-weight: bold;
      font-size: 16px;
      color: black;
      opacity: 0.85; /* allows seeing layers */
      border: 2px solid black;
    }

    .box1 {
      background: #4CAF50;
      top: 20px;
      left: 20px;
      z-index: 1;
    }

    .box2 {
      background: #8e73c4;
      top: 60px;
      left: 70px;
      z-index: 2;
    }

    .box3 {
      background: #6f7fbf;
      top: 100px;
      left: 120px;
      z-index: 3;
    }

    .box4 {
      background: #c7d34a;
      top: 140px;
      left: 170px;
      z-index: 4;
    }
  </style>
</head>

<body>

  <h2>Intro for Z Index</h2>
  <p>Layering example</p>

  <div class="container">
    <div class="box box1">Z index 1</div>
    <div class="box box2">Z index 2</div>
    <div class="box box3">Z index 3</div>
    <div class="box box4">Z index 4</div>
  </div>

</body>
</html>
