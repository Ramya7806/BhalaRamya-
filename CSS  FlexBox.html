<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flexbox Demo</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: Arial, sans-serif;
}

/* HEADER */
header{
    background:#2c3e50;
    color:white;
    text-align:center;
    padding:20px;
}

nav a{
    color:white;
    margin:0 10px;
    text-decoration:none;
}

/* HERO */
.hero{
    background: linear-gradient(to right,#4facfe,#00c6ff);
    color:white;
    text-align:center;
    padding:50px;
}

/* FEATURES */
.features{
    padding:30px;
    text-align:center;
}

.flex-container{
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    gap:20px;
}

.card{
    width:280px;
    background:#f4f4f4;
    padding:10px;
    border-radius:10px;
    transition:0.3s;
}

.card:hover{
    transform:scale(1.05);
}

.card img{
    width:100%;
    height:200px;
    object-fit:cover;
    border-radius:10px;
}

/* RESPONSIVE */
@media(max-width:768px){
    .card{
        width:90%;
    }
}
</style>
</head>

<body>

<header>
    <h1>CSS Flexbox Demonstration</h1>
    <nav>
        <a href="#">Home</a>
        <a href="#">About</a>
        <a href="#">Services</a>
        <a href="#">Contact</a>
    </nav>
</header>

<section class="hero">
    <h2>Welcome to our Flexbox Demo</h2>
    <p>Learn Flexbox easily</p>
</section>

<section class="features">
    <h2>Our Features</h2>

    <div class="flex-container">

        <div class="card">
            <img src="https://picsum.photos/300/200?random=1">
            <p>Nature</p>
        </div>

        <div class="card">
            <img src="https://picsum.photos/300/200?random=2">
            <p>Animals</p>
        </div>

        <div class="card">
            <img src="https://picsum.photos/300/200?random=3">
            <p>Architecture</p>
        </div>

        <div class="card">
            <img src="https://picsum.photos/300/200?random=4">
            <p>People</p>
        </div>

    </div>
</section>

</body>
</html>
